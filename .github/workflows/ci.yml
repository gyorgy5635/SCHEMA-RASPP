name: CI

on:
  push:
    branches: [master, py3-fix]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package (with test extras)
        run: python -m pip install --upgrade pip && pip install -e ".[test]"
      - name: Run full regression suite
        run: pytest -m "" -q

  build:
    name: build & entry points
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: python -m pip install build && python -m build
      - name: Install the wheel and check console scripts
        run: |
          pip install dist/*.whl
          for cmd in schema-contacts schema-energy schema-rasppcurve schema-random schema-pdbseq; do
            command -v "$cmd" || { echo "missing entry point: $cmd"; exit 1; }
          done
          python -c "import schema, raspp, pdbfile, schemautil"
